<article class="post-card">
  {% if post.image_url %}<a href="{{ post.url }}"><img src="{{ post.image_url }}" alt="{{ post.image_alt|default:'' }}"></a>{% endif %}
  <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
  <p><small><time datetime="{{ post.date|date:'c' }}">{{ post.date|date:"Y-m-d" }}</time></small></p>
  <p>{{ post.summary }}</p>
  {% if post.tags %}<p>{% for tag in post.tags %}<a href="{{ url_prefix }}/tag/{{ tag|slugify }}/">#{{ tag }}</a> {% endfor %}</p>{% endif %}
</article>
