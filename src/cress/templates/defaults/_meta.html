{% spaceless %}
<meta name="description" content="{{ page.summary|default:site.description }}">
<link rel="canonical" href="{{ canonical_url }}">
<meta property="og:title" content="{{ page.title|default:site.title }}">
<meta property="og:description" content="{{ page.summary|default:site.description }}">
<meta property="og:url" content="{{ canonical_url }}">
<meta property="og:type" content="{% if page %}article{% else %}website{% endif %}">
<meta property="og:locale" content="{{ site.locale }}">
{% if og_image_url %}<meta property="og:image" content="{{ og_image_url }}">{% if og_image_alt %}
<meta property="og:image:alt" content="{{ og_image_alt }}">{% endif %}{% endif %}
{% if site.twitter_handle %}<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="{{ site.twitter_handle }}">{% endif %}
{% if page %}{% for tag in page.tags %}<meta property="article:tag" content="{{ tag }}">
{% endfor %}{% endif %}
{% if features.json_ld and page %}<script type="application/ld+json">
{"@context":"https://schema.org","@type":"BlogPosting","headline":"{{ page.title }}","datePublished":"{{ page.date|date:'c' }}","author":{"@type":"Person","name":"{{ page.author }}"}}
</script>{% endif %}
{% endspaceless %}
