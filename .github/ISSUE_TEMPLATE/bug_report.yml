name: Bug report
description: Report something that isn't working as documented.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, what did you expect, and what happened instead?
      placeholder: |
        I ran `cress build` and ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: >
        A minimal `.cress/config.yaml` and/or vault snippet that reproduces the
        issue. The `--json` output of the failing command is often the most useful
        thing to paste.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: cress version
      description: Output of `cress --version` (or the commit you're on).
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.14.x"
    validations:
      required: true
