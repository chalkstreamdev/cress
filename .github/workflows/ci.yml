name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Tests
        run: uv run pytest

      - name: Type-check
        run: uv run mypy --strict src/cress

      - name: Lint
        run: uv run ruff check .
